<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pl - Tactical Lineup Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <a href="main.html"><img src="picture/logo.png" alt="Logo" class="logo"></a>
        </div>
        <nav>
            <ul>
                <li><a href="lineup.html" data-i18n="nav_lineups">Lineups</a></li>
                <li><a href="news.html" data-i18n="nav_news">News</a></li>
                <li><a href="videos.html" data-i18n="nav_videos">Videos</a></li>
            </ul>
        </nav>
        <div class="about-me-wrapper">
            <a href="#" class="about-me-button" id="aboutMeBtn" data-i18n="nav_about">About Me</a>
            <div class="about-me-dropdown" id="aboutMeDropdown">
                <div class="social-links">
                    <a href="https://www.tiktok.com/@sladee7766" target="_blank"><span>TikTok</span></a>
                    <a href="https://www.instagram.com/sladee7766" target="_blank"><span>Instagram</span></a>
                    <a href="https://www.youtube.com/@sladee7766" target="_blank"><span>YouTube</span></a>
                </div>
                <p class="username">@sladee7766</p>
            </div>
        </div>
    </header>

    <div class="viewer-container">
        <!-- Sidebar Selection -->
        <aside class="selection-sidebar">
            <div class="sidebar-section">
                <label class="section-title" data-i18n="sel_map">Map</label>
                <div class="map-list" id="mapList"></div>
            </div>
            <div class="sidebar-section">
                <label class="section-title" data-i18n="sel_agent">Agent</label>
                <div class="agent-grid" id="agentGrid"></div>
            </div>
        </aside>

        <!-- Map Engine -->
        <main class="map-area">
            <div class="map-wrapper" id="mapWrapper">
                <div id="mapContent" class="map-content">
                    <img src="maps/ascent.png" id="mainMapImg" draggable="false">
                    <!-- Trajectory Layer -->
                    <svg id="lineLayer" viewBox="0 0 100 100" preserveAspectRatio="none" style="width:100%; height:100%; position:absolute; top:0; left:0;"></svg>
                    <!-- Interaction Layer -->
                    <div id="dotLayer"></div>
                </div>
                
                <!-- Floating Map UI -->
                <button class="reset-zoom-btn" onclick="resetView()" data-i18n="reset_view">Reset View</button>
                <div class="ability-bar" id="abilityBar"></div>
            </div>
        </main>

        <!-- Video Overlay (Slides over map) -->
        <aside class="video-sidebar" id="videoSidebar">
            <h3 data-i18n="preview_title">Lineup Preview</h3>
            <div id="videoDisplay"></div>
        </aside>
    </div>

    <!-- SECRET COORDINATE TOOL (Shift + Click to trigger) -->
    <div id="coordPopup" class="coord-popup">
        <h3 style="color: white; margin-bottom: 10px;">Coordinates Logged</h3>
        <code id="coordText"></code>
        <button onclick="closeCoordPopup()">Close</button>
    </div>

    <!-- Settings Gear -->
    <div class="settings-container">
        <button class="settings-btn" id="settingsBtn">⚙</button>
        <div class="settings-panel" id="settingsPanel">
            <h4 data-i18n="settings_title" style="margin-bottom:10px;">Settings</h4>
            <button class="lang-btn" onclick="changeLanguage('en')">🇺🇸 English</button>
            <button class="lang-btn" onclick="changeLanguage('tr')">🇹🇷 Türkçe</button>
        </div>
    </div>

    <!-- Script Imports -->
    <script src="lineups.js"></script>
    <script src="news_data.js"></script>
    <script src="script.js"></script>

    <script>
        // Default Starting State
        let currentMap = "ascent", currentAgent = "sova", currentAbility = "Recon";
        
        // Map State Variables
        let scale = 1, translateX = 0, translateY = 0, isDragging = false, startX, startY, moved = false;
        let activeLineupData = null;

        const mapWrapper = document.getElementById('mapWrapper'), 
              mapContent = document.getElementById('mapContent'), 
              mainMapImg = document.getElementById('mainMapImg'), 
              videoSidebar = document.getElementById('videoSidebar');

        function initLineupPage() {
            // Force re-centering when image finishes loading
            mainMapImg.onload = () => { resetView(); updateDotsAndList(); };
            
            renderMaps(); 
            renderAgents(); 
            setupPanAndZoom();
            
            // Background Click Logic
            mapWrapper.addEventListener('click', (e) => {
                if (moved) return;
                // If user clicks on empty space, reset the view
                if (e.target === mapWrapper || e.target === mapContent || e.target === mainMapImg) {
                    resetView();
                }
            });

            // Secret Tool: Shift + Click anywhere on the map
            mapWrapper.addEventListener('click', (e) => {
                if (e.shiftKey) {
                    const rect = mapContent.getBoundingClientRect();
                    const x = ((e.clientX - rect.left) / rect.width) * 100;
                    const y = ((e.clientY - rect.top) / rect.height) * 100;
                    document.getElementById('coordText').innerText = `target: { x: ${x.toFixed(1)}, y: ${y.toFixed(1)} }`;
                    document.getElementById('coordPopup').classList.add('active');
                }
            });

            // Handle Deep Links from Homepage
            const params = new URLSearchParams(window.location.search);
            if (params.has('agent')) {
                currentMap = params.get('map');
                currentAgent = params.get('agent');
                currentAbility = params.get('ability');
                const targetTitle = params.get('title');
                
                renderMaps(); renderAgents(); renderAbilities();
                mainMapImg.onload = () => {
                    updateDotsAndList();
                    const filtered = lineupData.find(l => l.title === targetTitle && l.map === currentMap);
                    if(filtered) {
                        const group = lineupData.filter(l => l.target.x === filtered.target.x && l.target.y === filtered.target.y);
                        selectTargetGroup(group, null, filtered); 
                    }
                };
            }
        }

        // --- Camera & Interaction ---
        function setupPanAndZoom() {
            mapWrapper.addEventListener('mousedown', (e) => {
                if (e.target.closest('.map-dot') || e.target.closest('.ability-bar') || e.target.closest('.reset-zoom-btn') || e.shiftKey) return;
                isDragging = true; moved = false;
                startX = e.clientX - translateX; startY = e.clientY - translateY;
            });
            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                moved = true;
                translateX = e.clientX - startX;
                translateY = e.clientY - startY;
                applyTransform();
            });
            window.addEventListener('mouseup', () => isDragging = false);

            mapWrapper.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY < 0 ? 1.1 : 0.9;
                const newScale = Math.min(Math.max(1, scale * delta), 5);
                const rect = mapWrapper.getBoundingClientRect();
                
                translateX = (e.clientX - rect.left) - ((e.clientX - rect.left) - translateX) * (newScale / scale);
                translateY = (e.clientY - rect.top) - ((e.clientY - rect.top) - translateY) * (newScale / scale);
                
                scale = newScale;
                applyTransform();
            }, {passive: false});
        }

        function applyTransform() { mapContent.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`; }

        function resetView() {
            scale = 1;
            const container = mapWrapper.getBoundingClientRect();
            // Perfectly center the image within the black wrapper
            translateX = (container.width - mainMapImg.offsetWidth) / 2;
            translateY = (container.height - mainMapImg.offsetHeight) / 2;
            
            mapContent.style.transition = 'transform 0.4s ease-out';
            applyTransform();
            setTimeout(() => mapContent.style.transition = 'none', 400);
            
            activeLineupData = null;
            videoSidebar.classList.remove('active');
            document.querySelectorAll('.target-dot').forEach(d => d.classList.remove('active-target'));
            document.getElementById('lineLayer').innerHTML = "";
            document.querySelectorAll('.origin-dot').forEach(d => d.remove());
        }

        function centerOnTarget(x, y) {
            scale = 2.5; 
            const container = mapWrapper.getBoundingClientRect();
            const pxX = (x / 100) * mainMapImg.offsetWidth;
            const pxY = (y / 100) * mainMapImg.offsetHeight;

            translateX = (container.width / 2) - (pxX * scale);
            translateY = (container.height / 2) - (pxY * scale);

            mapContent.style.transition = 'transform 0.6s cubic-bezier(0.2, 0, 0.2, 1)';
            applyTransform();
            setTimeout(() => mapContent.style.transition = 'none', 600);
        }

        // --- Rendering Logic ---
        function renderMaps() {
            const list = document.getElementById('mapList'); list.innerHTML = "";
            maps.forEach(m => {
                const banner = document.createElement('div');
                banner.className = `map-banner ${m === currentMap ? 'active' : ''}`;
                banner.style.backgroundImage = `url('map_backgrounds/${m}.jpg')`;
                banner.innerHTML = `<span>${m}</span>`;
                banner.onclick = () => { currentMap = m; resetView(); updateMap(); renderMaps(); };
                list.appendChild(banner);
            });
        }

        function renderAgents() {
            const grid = document.getElementById('agentGrid'); grid.innerHTML = "";
            agents.forEach(a => {
                const img = document.createElement('img');
                img.src = `agents/${a}.png`; img.className = `agent-icon ${a === currentAgent ? 'active' : ''}`;
                img.onclick = () => { currentAgent = a; currentAbility = abilityIcons[a][0]; resetView(); renderAgents(); renderAbilities(); updateDotsAndList(); };
                grid.appendChild(img);
            });
            renderAbilities();
        }

        function renderAbilities() {
            const bar = document.getElementById('abilityBar'); bar.innerHTML = "";
            const abilities = abilityIcons[currentAgent] || [];
            abilities.forEach(ab => {
                const btn = document.createElement('button'); btn.innerText = ab; btn.className = `ability-btn ${ab === currentAbility ? 'active' : ''}`;
                btn.onclick = (e) => { e.stopPropagation(); currentAbility = ab; renderAbilities(); updateDotsAndList(); };
                bar.appendChild(btn);
            });
        }

        function updateMap() { mainMapImg.src = `maps/${currentMap}.png`; }

        function updateDotsAndList() {
            const dl = document.getElementById('dotLayer'), ll = document.getElementById('lineLayer');
            dl.innerHTML = ""; ll.innerHTML = ""; videoSidebar.classList.remove('active');
            
            const filtered = lineupData.filter(l => l.map === currentMap && l.agent === currentAgent && l.ability === currentAbility);
            const grouped = {};
            filtered.forEach(l => { const key = `${l.target.x}_${l.target.y}`; if (!grouped[key]) grouped[key] = []; grouped[key].push(l); });

            Object.values(grouped).forEach(group => {
                const rep = group[0];
                const dot = document.createElement('div');
                dot.className = 'map-dot target-dot';
                dot.style.left = rep.target.x + "%"; dot.style.top = rep.target.y + "%";
                if (group.length > 1) dot.innerHTML = `<span class="badge-count">${group.length}</span>`;
                
                dot.onclick = (e) => { e.stopPropagation(); selectTargetGroup(group, dot); };
                dl.appendChild(dot);
            });
        }

        function selectTargetGroup(group, targetDotEl, deepLinkLineup = null) {
            document.querySelectorAll('.target-dot').forEach(d => d.classList.remove('active-target'));
            if(targetDotEl) targetDotEl.classList.add('active-target');
            
            document.querySelectorAll('.origin-dot').forEach(d => d.remove());
            document.getElementById('lineLayer').innerHTML = "";

            group.forEach((l) => {
                const origin = document.createElement('div');
                origin.className = 'map-dot origin-dot';
                origin.style.left = l.origin.x + "%"; origin.style.top = l.origin.y + "%";
                origin.style.backgroundImage = `url('agents/${l.agent}.png')`;
                document.getElementById('dotLayer').appendChild(origin);

                const dPath = `M ${l.origin.x} ${l.origin.y} L ${l.target.x} ${l.target.y}`;
                const pathGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
                const line = document.createElementNS("http://www.w3.org/2000/svg", "path");
                line.setAttribute("d", dPath); line.setAttribute("class", "trajectory-line");
                
                const particle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                particle.setAttribute("class", "trajectory-particle flow-animation");
                particle.style.offsetPath = `path('${dPath}')`;
                
                pathGroup.appendChild(line); pathGroup.appendChild(particle);
                document.getElementById('lineLayer').appendChild(pathGroup);

                origin.onclick = (e) => { 
                    e.stopPropagation();
                    if (activeLineupData === l) {
                        videoSidebar.classList.remove('active');
                        activeLineupData = null;
                        line.classList.remove('active');
                        origin.style.borderColor = "white";
                    } else {
                        setActiveLineup(l, origin, line);
                    }
                };
                
                if (deepLinkLineup && l.title === deepLinkLineup.title) {
                    setActiveLineup(l, origin, line);
                }
            });

            centerOnTarget(group[0].target.x, group[0].target.y);
        }

        function setActiveLineup(lineup, originEl, lineEl) {
            activeLineupData = lineup;
            document.querySelectorAll('.origin-dot').forEach(d => {
                d.style.borderColor = "white"; d.style.boxShadow = "0 0 15px rgba(255,255,255,0.5)";
            });
            document.querySelectorAll('.trajectory-line').forEach(l => l.classList.remove('active'));
            
            originEl.style.borderColor = "var(--accent-gold)";
            originEl.style.boxShadow = "0 0 25px var(--accent-gold)";
            lineEl.classList.add('active');

            videoSidebar.classList.add('active');
            document.getElementById('videoDisplay').innerHTML = `
                <div class="video-container-active">
                    <h4 style="color:var(--accent-gold); margin-bottom:10px;">${lineup.title}</h4>
                    <div class="iframe-wrapper"><iframe src="${lineup.video}" frameborder="0" allowfullscreen></iframe></div>
                </div>`;
        }

        function closeCoordPopup() { document.getElementById('coordPopup').classList.remove('active'); }

        window.onload = initLineupPage;
    </script>
</body>
</html>
