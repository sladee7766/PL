<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pl - Viewer</title><link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-container"><a href="main.html"><img src="picture/logo.png" class="logo"></a></div>
        <nav><ul><li><a href="lineup.html" data-i18n="nav_lineups">Lineups</a></li><li><a href="news.html" data-i18n="nav_news">News</a></li><li><a href="videos.html" data-i18n="nav_videos">Videos</a></li><li><a href="crosshairs.html" data-i18n="nav_cross">Crosshairs</a></li><li><a href="submit.html" data-i18n="nav_sub">Submit</a></li></ul></nav>
        <div class="about-me-wrapper"><a href="#" class="about-me-button" id="aboutMeBtn" data-i18n="nav_about">About Me</a>
            <div class="about-me-dropdown" id="aboutMeDropdown"><div class="social-links"><a href="https://www.tiktok.com/@sladee7766" target="_blank">TikTok</a><a href="https://www.instagram.com/sladee7766" target="_blank">Instagram</a><a href="https://www.youtube.com/@sladee7766" target="_blank">YouTube</a></div></div>
        </div>
    </header>

    <div class="viewer-container">
        <aside class="selection-sidebar">
            <div class="sidebar-section"><label class="section-title" data-i18n="sel_map">Map</label><div class="map-list" id="mapList"></div></div>
            <div class="sidebar-section"><label class="section-title" data-i18n="side_label">Side & Favs</label>
                <div class="side-toggle">
                    <button class="filter-btn side-filter-btn active" onclick="setSide('all', this)" data-i18n="side_all">All</button>
                    <button class="filter-btn side-filter-btn" onclick="setSide('attack', this)" data-i18n="side_atk">Atk</button>
                    <button class="filter-btn side-filter-btn" onclick="setSide('defense', this)" data-i18n="side_def">Def</button>
                </div>
                <button class="filter-btn side-btn" id="favFilterBtn" onclick="toggleFavFilter(this)" style="width:100%; margin-top:5px;" data-i18n="fav_filter">Favorites</button>
            </div>
            <div class="sidebar-section"><label class="section-title" data-i18n="diff_label">Difficulty</label>
                <div class="side-toggle">
                    <button class="filter-btn diff-filter-btn active" onclick="setDiff('all', this)" data-i18n="side_all">All</button>
                    <button class="filter-btn diff-filter-btn" onclick="setDiff('easy', this)" data-i18n="easy">Easy</button>
                    <button class="filter-btn diff-filter-btn" onclick="setDiff('medium', this)" data-i18n="medium">Med</button>
                    <button class="filter-btn diff-filter-btn" onclick="setDiff('hard', this)" data-i18n="hard">Hard</button>
                </div>
            </div>
            <div class="sidebar-section"><label class="section-title" data-i18n="sel_agent">Agent</label><input type="text" id="agentSearch" class="search-bar" data-i18n="search_placeholder" oninput="renderAgents()"><div class="agent-grid" id="agentGrid"></div></div>
        </aside>

        <main class="map-area">
            <div class="map-wrapper" id="mapWrapper">
                <button class="reset-zoom-btn" onclick="resetView()" data-i18n="reset_view">Reset View</button>
                <div class="ability-bar" id="abilityBar"></div>
                <div id="mapContent" class="map-content">
                    <img src="maps/ascent.png" id="mainMapImg" draggable="false">
                    <svg id="lineLayer" viewBox="0 0 100 100" preserveAspectRatio="none" style="width:100%; height:100%; position:absolute; top:0; left:0;"></svg>
                    <div id="dotLayer"></div>
                </div>
            </div>
        </main>
        <aside class="video-sidebar" id="videoSidebar"><h3 data-i18n="preview_title">Preview</h3><div id="videoDisplay"></div></aside>
    </div>

    <div id="coordPopup" class="coord-popup"><h3 style="color:white; margin-bottom:10px;">Coords</h3><code id="coordText"></code><button class="copy-btn" onclick="document.getElementById('coordPopup').classList.remove('active')">Close</button></div>

    <div class="settings-container"><button class="settings-btn" id="settingsBtn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></button>
        <div class="settings-panel" id="settingsPanel"><h4 data-i18n="settings_title">Settings</h4><button class="lang-btn" id="sfxToggleBtn">Sound: ON</button><button class="lang-btn" onclick="changeLanguage('en')">[EN] English</button><button class="lang-btn" onclick="changeLanguage('tr')">[TR] Türkçe</button></div>
    </div>

    <script src="lineups.js"></script><script src="script.js"></script>
    <script>
        let currentMap="ascent", currentAgent="sova", currentAbility="Recon", currentSide="all", currentDiff="all", showOnlyFavs=false;
        let scale=1, translateX=0, translateY=0, isDragging=false, startX, startY, moved=false, activeLineupData=null;
        const mapWrapper=document.getElementById('mapWrapper'), mapContent=document.getElementById('mapContent'), mainMapImg=document.getElementById('mainMapImg'), videoSidebar=document.getElementById('videoSidebar');

        function initLineupPage() {
            mainMapImg.onload = () => { resetView(); updateDotsAndList(); 
                const p = new URLSearchParams(window.location.search);
                if(p.has('title')) {
                    const decodedTitle = decodeURIComponent(p.get('title'));
                    const f = lineupData.find(l => l.title === decodedTitle && l.map === currentMap);
                    if(f) setTimeout(() => { selectTargetGroup(lineupData.filter(x => x.target.x === f.target.x && x.target.y === f.target.y), null, f); }, 150);
                }
            };
            const p = new URLSearchParams(window.location.search);
            if(p.has('agent')) { currentMap=p.get('map'); currentAgent=p.get('agent'); currentAbility=p.get('ability'); applyAgentTheme(currentAgent); }
            mainMapImg.src = `maps/${currentMap}.png`;
            renderMaps(); renderAgents(); setupPanAndZoom();
            if(mainMapImg.complete) mainMapImg.onload();

            mapWrapper.addEventListener('click', (e) => { if(!moved && (e.target === mapWrapper || e.target === mapContent || e.target === mainMapImg)) resetView(); });
            mapWrapper.addEventListener('click', (e) => { if(e.shiftKey) { const r = mapContent.getBoundingClientRect(); const x = ((e.clientX - r.left)/r.width)*100, y = ((e.clientY - r.top)/r.height)*100; document.getElementById('coordText').innerText = `target: { x: ${x.toFixed(1)}, y: ${y.toFixed(1)} }`; document.getElementById('coordPopup').classList.add('active'); } });
        }
        function setupPanAndZoom() {
            mapWrapper.addEventListener('mousedown', (e) => { if(e.target.closest('.map-dot') || e.target.closest('.ability-bar') || e.target.closest('.reset-zoom-btn') || e.shiftKey) return; e.preventDefault(); isDragging=true; moved=false; startX=e.clientX-translateX; startY=e.clientY-translateY; });
            window.addEventListener('mousemove', (e) => { if(!isDragging) return; moved=true; translateX=e.clientX-startX; translateY=e.clientY-startY; applyTransform(); });
            window.addEventListener('mouseup', () => isDragging=false);
            mapWrapper.addEventListener('wheel', (e) => { e.preventDefault(); let d=e.deltaY<0?1.1:0.9; let ns=Math.min(Math.max(1, scale*d), 5); let r=mapWrapper.getBoundingClientRect(); translateX=(e.clientX-r.left)-((e.clientX-r.left)-translateX)*(ns/scale); translateY=(e.clientY-r.top)-((e.clientY-r.top)-translateY)*(ns/scale); scale=ns; applyTransform(); }, {passive:false});
        }
        function applyTransform() { mapContent.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`; }
        function resetView() { scale=1; const r=mapWrapper.getBoundingClientRect(); translateX=(r.width-mainMapImg.offsetWidth)/2; translateY=(r.height-mainMapImg.offsetHeight)/2; mapContent.style.transition='transform 0.4s ease-out'; applyTransform(); setTimeout(()=>mapContent.style.transition='none', 400); activeLineupData=null; videoSidebar.classList.remove('active'); document.querySelectorAll('.target-dot').forEach(d=>d.classList.remove('active-target')); document.getElementById('lineLayer').innerHTML=""; document.querySelectorAll('.origin-dot').forEach(d=>d.remove()); }
        function centerOnTarget(x,y) { scale=2.5; const r=mapWrapper.getBoundingClientRect(); translateX=(r.width/2)-(x/100*mainMapImg.offsetWidth*scale); translateY=(r.height/2)-(y/100*mainMapImg.offsetHeight*scale); mapContent.style.transition='transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)'; applyTransform(); setTimeout(()=>mapContent.style.transition='none', 600); }
        
        function setSide(s,btn) { currentSide=s; document.querySelectorAll('.side-filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); updateDotsAndList(); }
        function setDiff(d,btn) { currentDiff=d; document.querySelectorAll('.diff-filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); updateDotsAndList(); }
        function toggleFavFilter(btn) { showOnlyFavs=!showOnlyFavs; btn.classList.toggle('active'); updateDotsAndList(); }
        
        function renderMaps() { let l=document.getElementById('mapList'); l.innerHTML=""; maps.forEach(m=>{ let b=document.createElement('div'); b.className=`map-banner ${m===currentMap?'active':''}`; b.style.backgroundImage=`url('map_backgrounds/${m}.jpg')`; b.innerHTML=`<span>${m}</span>`; b.onclick=()=>{currentMap=m; resetView(); updateMap(); renderMaps();}; l.appendChild(b); }); }
        function renderAgents() { const grid = document.getElementById('agentGrid'), q = document.getElementById('agentSearch').value.toLowerCase(); grid.innerHTML = ""; agents.filter(a => a.includes(q)).forEach(a => { let i = document.createElement('img'); i.src = `agents/${a}.png`; i.className = `agent-icon ${a === currentAgent ? 'active' : ''}`; i.onclick = () => { currentAgent = a; currentAbility = (abilityIcons[a] && abilityIcons[a][0]) || ""; applyAgentTheme(a); resetView(); renderAgents(); renderAbilities(); updateDotsAndList(); }; grid.appendChild(i); }); renderAbilities(); }
        function renderAbilities() { let b = document.getElementById('abilityBar'); b.innerHTML = ""; (abilityIcons[currentAgent]||[]).forEach(ab => { let btn = document.createElement('button'); btn.innerText = ab; btn.className = `ability-btn ${ab === currentAbility ? 'active' : ''}`; btn.onclick = (e) => { e.stopPropagation(); currentAbility = ab; renderAbilities(); updateDotsAndList(); resetView(); }; b.appendChild(btn); }); }
        function updateMap() { mainMapImg.src = `maps/${currentMap}.png`; }
        function updateDotsAndList() {
            let dl=document.getElementById('dotLayer'), ll=document.getElementById('lineLayer'); dl.innerHTML=""; ll.innerHTML=""; videoSidebar.classList.remove('active');
            let filtered = lineupData.filter(l=>l.map===currentMap && l.agent===currentAgent && l.ability===currentAbility && (currentSide==='all' || (l.side && l.side.toLowerCase()===currentSide)) && (currentDiff==='all' || (l.difficulty && l.difficulty.toLowerCase()===currentDiff)) && (!showOnlyFavs || isFavorite(l.title)));
            let grouped={}; filtered.forEach(l=>{ let k=`${l.target.x}_${l.target.y}`; if(!grouped[k]) grouped[k]=[]; grouped[k].push(l); });
            Object.values(grouped).forEach(g=>{ let d=document.createElement('div'); d.className='map-dot target-dot'; d.style.left=g[0].target.x+"%"; d.style.top=g[0].target.y+"%"; if(g.length>1) d.innerHTML=`<span class="badge-count">${g.length}</span>`; d.onclick=(e)=>{e.stopPropagation(); selectTargetGroup(g,d);}; dl.appendChild(d); });
        }
        function selectTargetGroup(g,d=null,force=null) { document.querySelectorAll('.target-dot').forEach(x=>x.classList.remove('active-target')); if(d) d.classList.add('active-target'); document.querySelectorAll('.origin-dot').forEach(x=>x.remove()); document.getElementById('lineLayer').innerHTML=""; g.forEach(l=>{
            let o=document.createElement('div'); o.className='map-dot origin-dot'; o.style.left=l.origin.x+"%"; o.style.top=l.origin.y+"%"; o.style.backgroundImage=`url('agents/${l.agent}.png')`; document.getElementById('dotLayer').appendChild(o);
            let dP=`M ${l.origin.x} ${l.origin.y} L ${l.target.x} ${l.target.y}`; let pg=document.createElementNS("http://www.w3.org/2000/svg","g"), ln=document.createElementNS("http://www.w3.org/2000/svg","path"), pr=document.createElementNS("http://www.w3.org/2000/svg","circle");
            ln.setAttribute("d",dP); ln.setAttribute("class","trajectory-line"); pr.setAttribute("class","trajectory-particle flow-animation"); pr.style.offsetPath=`path('${dP}')`; pg.appendChild(ln); pg.appendChild(pr); if(l.radius) { let r=document.createElementNS("http://www.w3.org/2000/svg","circle"); r.setAttribute("cx",l.target.x); r.setAttribute("cy",l.target.y); r.setAttribute("r",l.radius); r.setAttribute("class","impact-radius"); pg.appendChild(r); } document.getElementById('lineLayer').appendChild(pg);
            o.onclick=(e)=>{ e.stopPropagation(); if(activeLineupData===l) { videoSidebar.classList.remove('active'); activeLineupData=null; ln.classList.remove('active'); o.style.borderColor="white"; } else setActiveLineup(l,o,ln); }; if(force && l.title === force.title) setActiveLineup(l,o,ln);
        }); centerOnTarget(g[0].target.x, g[0].target.y); }
        function setActiveLineup(l,o,ln) { if(typeof playSwoosh === 'function') playSwoosh(); const la=localStorage.getItem('app_lang')||'en'; activeLineupData=l; document.querySelectorAll('.origin-dot').forEach(x=>{x.style.borderColor="white"; x.style.boxShadow="0 0 10px rgba(0,0,0,0.5)";}); document.querySelectorAll('.trajectory-line').forEach(x=>x.classList.remove('active')); o.style.borderColor="var(--accent-gold)"; ln.classList.add('active'); videoSidebar.classList.add('active');
            const rd = l.difficulty ? l.difficulty.toLowerCase() : ""; const dTxt = rd ? (translations[la][rd] || rd) : ""; const dH = dTxt ? `<div class="difficulty-tag diff-${rd}">${dTxt}</div>` : "";
            const isF = isFavorite(l.title); const fT = isF ? translations[la].remove_strat : translations[la].save_strat; const fC = isF ? 'fav-active' : '';
            document.getElementById('videoDisplay').innerHTML=`<div><h4 style="color:var(--accent-gold);margin-bottom:5px;">${l.title}</h4>${dH}<div class="iframe-wrapper"><iframe src="${l.video}" allowfullscreen></iframe></div><div class="action-btns"><button class="action-btn" id="copyBtn" onclick="copyShareLink('${l.title}')">${translations[la].copy_link}</button><button class="action-btn ${fC}" id="favActionBtn" onclick="handleFav('${l.title}')">${fT}</button></div></div>`;
        }
        function handleFav(t) { const isF = toggleFavorite(t); const b = document.getElementById('favActionBtn'), la = localStorage.getItem('app_lang') || 'en'; b.innerText = isF ? translations[la].remove_strat : translations[la].save_strat; if(isF) b.classList.add('fav-active'); else b.classList.remove('fav-active'); if(showOnlyFavs) updateDotsAndList(); }
        function copyShareLink(t) { const url=`${window.location.origin}${window.location.pathname}?map=${currentMap}&agent=${currentAgent}&ability=${currentAbility}&title=${encodeURIComponent(t)}`; const el=document.createElement('textarea'); el.value=url; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); const b=document.getElementById('copyBtn'), la=localStorage.getItem('app_lang')||'en'; b.innerText=translations[la].link_copied; b.style.background="var(--primary-color)"; setTimeout(()=>{b.innerText=translations[la].copy_link; b.style.background="rgba(255,255,255,0.05)";}, 2000); }
        window.onload = initLineupPage;
    </script>
</body>
</html>
