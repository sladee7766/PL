<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lineup Viewer Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
</head>
<body>
    
    <!-- Top Bar -->
    <div class="top-bar">
        <a href="index.html" class="logo-link">
            <img src="foto/logo.png" alt="Website Logo" class="logo">
        </a>
        <div class="nav-links">
            <a href="lineup.html" data-text="navLineups">Lineups</a>
            <a href="favorites.html" data-text="navFavorites">Favorites</a>
            <a href="crosshairs.html" data-text="navCrosshairs">Crosshairs</a>
            <a href="news.html" data-text="navNews">News</a>
            <a href="videos.html" data-text="navVideos">Videos</a>
            <a href="submit.html" data-text="navSubmit">Submit</a>
        </div>
        
        <!-- NEW: Search Bar (Only on this page) -->
        <div class="search-container">
            <input type="text" id="lineup-search" placeholder="Search lineups (e.g. Sova Haven)..." onkeyup="handleSearch()">
            <div id="search-results" class="search-results"></div>
        </div>
    </div>

    <!-- NEW DASHBOARD LAYOUT -->
    <div class="dashboard-layout">
        
        <!-- LEFT SIDEBAR -->
        <aside class="dashboard-sidebar">
            <h3 class="sidebar-title" data-text="lineupSelectMap">Select a Map</h3>
            <div class="sidebar-grid">
                <div class="dash-btn map-btn" id="btn-map-ascent" onclick="selectMap('ascent')">ASCENT</div>
                <div class="dash-btn map-btn" id="btn-map-breeze" onclick="selectMap('breeze')">BREEZE</div>
                <div class="dash-btn map-btn" id="btn-map-fracture" onclick="selectMap('fracture')">FRACTURE</div>
                <div class="dash-btn map-btn" id="btn-map-haven" onclick="selectMap('haven')">HAVEN</div>
                <div class="dash-btn map-btn" id="btn-map-lotus" onclick="selectMap('lotus')">LOTUS</div>
                <div class="dash-btn map-btn" id="btn-map-pearl" onclick="selectMap('pearl')">PEARL</div>
                <div class="dash-btn map-btn" id="btn-map-split" onclick="selectMap('split')">SPLIT</div>
            </div>

            <h3 class="sidebar-title" data-text="lineupSelectAgent">Select an Agent</h3>
            <div class="sidebar-agent-grid">
                <div class="dash-btn agent-btn" id="btn-agent-brimstone" onclick="selectAgent('brimstone')"><img src="agents/brimstone.png" alt="Brimstone"></div>
                <div class="dash-btn agent-btn" id="btn-agent-cypher" onclick="selectAgent('cypher')"><img src="agents/cypher.png" alt="Cypher"></div>
                <div class="dash-btn agent-btn" id="btn-agent-deadlock" onclick="selectAgent('deadlock')"><img src="agents/deadlock.png" alt="Deadlock"></div>
                <div class="dash-btn agent-btn" id="btn-agent-fade" onclick="selectAgent('fade')"><img src="agents/fade.png" alt="Fade"></div>
                <div class="dash-btn agent-btn" id="btn-agent-kayo" onclick="selectAgent('kayo')"><img src="agents/kayo.png" alt="Kayo"></div>
                <div class="dash-btn agent-btn" id="btn-agent-killjoy" onclick="selectAgent('killjoy')"><img src="agents/killjoy.png" alt="Killjoy"></div>
                <div class="dash-btn agent-btn" id="btn-agent-miks" onclick="selectAgent('miks')"><img src="agents/miks.png" alt="Miks"></div>
                <div class="dash-btn agent-btn" id="btn-agent-sova" onclick="selectAgent('sova')"><img src="agents/sova.png" alt="Sova"></div>
                <div class="dash-btn agent-btn" id="btn-agent-veto" onclick="selectAgent('veto')"><img src="agents/veto.png" alt="Veto"></div>
                <div class="dash-btn agent-btn" id="btn-agent-viper" onclick="selectAgent('viper')"><img src="agents/viper.png" alt="Viper"></div>
                <div class="dash-btn agent-btn" id="btn-agent-vyse" onclick="selectAgent('vyse')"><img src="agents/vyse.png" alt="Vyse"></div>
            </div>
        </aside>

        <!-- RIGHT MAIN VIEWER -->
        <main class="dashboard-viewer">
            <h2 id="viewer-title" class="viewer-header-title">SELECT A MAP AND AGENT</h2>
            
            <div id="placeholder-text" class="placeholder-text">
                Please select both a Map and an Agent from the sidebar to view lineups.
            </div>

            <div id="viewer-layout" class="viewer-layout" style="display: none;">
                <div class="map-layout-container">
                    <div class="map-relative-wrapper">
                        <img id="current-map-layout" src="" alt="Map Layout" onclick="getMapCoordinates(event)">
                        <svg id="lineup-svg"></svg>
                        <div id="pins-container"></div>
                    </div>
                </div>
                
                <div id="lineup-details" class="lineup-info">
                    <h3 id="panel-title" data-text="lineupGuideTitle">Map Guide</h3>
                    <p id="panel-desc" data-text="lineupGuideDesc"></p>
                    <div id="video-container"></div>
                </div>
            </div>
        </main>
    </div>

    <footer class="beta-footer" data-text="footerText">
        BETA 1.0.0
    </footer>

    <script src="lineups.js"></script>
    <script>
        let currentMap = "";
        let currentAgent = "";
        let activeGroupIndex = null;
        let currentGroups = []; 

        // Extract the loading logic so the Search Bar can use it too!
        function loadLineupById(lineupId) {
            const selectedLineup = lineupsData.find(l => l.id === lineupId);
            if (selectedLineup) {
                selectMap(selectedLineup.map);
                selectAgent(selectedLineup.agent);
                
                setTimeout(() => {
                    const originPin = document.getElementById(`origin-${lineupId}`);
                    if (originPin) {
                        const groupClass = Array.from(originPin.classList).find(c => c.startsWith('origin-group-'));
                        const index = parseInt(groupClass.replace('origin-group-', ''));
                        
                        const targetPin = document.querySelector(`.target-group-${index}`);
                        if(targetPin) targetPin.click();
                        
                        originPin.click();
                    }
                }, 100);
            }
        }

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const lineupId = urlParams.get('id'); 
            if (lineupId && typeof lineupsData !== 'undefined') {
                loadLineupById(lineupId);
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        };

        // NEW: Search Bar Logic
        function handleSearch() {
            const query = document.getElementById('lineup-search').value.toLowerCase();
            const resultsBox = document.getElementById('search-results');
            resultsBox.innerHTML = '';
            
            if (!query) { 
                resultsBox.style.display = 'none'; 
                return; 
            }

            // Look for matching map, agent, or title
            const matches = lineupsData.filter(l => 
                l.title.toLowerCase().includes(query) || 
                l.agent.toLowerCase().includes(query) || 
                l.map.toLowerCase().includes(query)
            );

            if (matches.length === 0) {
                resultsBox.style.display = 'block';
                resultsBox.innerHTML = '<div class="search-item" style="color:#888;">No results found...</div>';
                return;
            }

            resultsBox.style.display = 'block';
            
            // Show top 5 matches
            matches.slice(0, 5).forEach(l => {
                const div = document.createElement('div');
                div.className = 'search-item';
                div.innerText = `${l.agent.toUpperCase()} ${l.map.toUpperCase()} - ${l.title}`;
                
                // When clicked, clear search and load lineup!
                div.onclick = () => {
                    document.getElementById('lineup-search').value = '';
                    resultsBox.style.display = 'none';
                    loadLineupById(l.id);
                };
                resultsBox.appendChild(div);
            });
        }

        // Close search dropdown if clicked outside
        document.addEventListener('click', (e) => {
            if(!e.target.closest('.search-container')) {
                document.getElementById('search-results').style.display = 'none';
            }
        });

        // Dashboard logic
        function selectMap(mapName) {
            currentMap = mapName;
            document.querySelectorAll('.map-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-map-${mapName}`).classList.add('active');
            checkAndRender();
        }

        function selectAgent(agentName) {
            currentAgent = agentName;
            document.querySelectorAll('.agent-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-agent-${agentName}`).classList.add('active');
            checkAndRender();
        }

        function checkAndRender() {
            if (currentMap !== "" && currentAgent !== "") {
                document.getElementById('placeholder-text').style.display = 'none';
                document.getElementById('viewer-layout').style.display = 'flex';
                
                document.getElementById('current-map-layout').src = `maps/${currentMap}.png`;
                document.getElementById('viewer-title').innerText = `${currentMap.toUpperCase()} - ${currentAgent.toUpperCase()}`;
                
                resetViewerPanel();
                renderPins();
            } else if (currentMap !== "") {
                document.getElementById('viewer-title').innerText = `${currentMap.toUpperCase()} - SELECT AGENT`;
            } else if (currentAgent !== "") {
                document.getElementById('viewer-title').innerText = `SELECT MAP - ${currentAgent.toUpperCase()}`;
            }
        }

        function resetViewerPanel() {
            activeGroupIndex = null;
            document.getElementById('panel-title').innerHTML = siteTexts.lineupGuideTitle; 
            document.getElementById('panel-desc').innerHTML = siteTexts.lineupGuideDesc; 
            document.getElementById('video-container').innerHTML = "";
            document.getElementById('lineup-svg').innerHTML = "";
        }

        function renderPins() {
            const container = document.getElementById('pins-container');
            container.innerHTML = ""; 

            const filteredLineups = lineupsData.filter(l => l.map === currentMap && l.agent === currentAgent);

            const groupsObj = {};
            filteredLineups.forEach(l => {
                const key = `${l.target[0]}-${l.target[1]}`;
                if (!groupsObj[key]) {
                    groupsObj[key] = { target: l.target, lineups: [] };
                }
                groupsObj[key].lineups.push(l);
            });
            
            currentGroups = Object.values(groupsObj);

            currentGroups.forEach((group, index) => {
                const targetPin = document.createElement('div');
                targetPin.className = `pin pin-target target-group-${index}`;
                targetPin.style.left = `${group.target[0]}%`;
                targetPin.style.top = `${group.target[1]}%`;
                
                targetPin.onmouseenter = () => handleTargetHover(group, index);
                targetPin.onmouseleave = () => handleTargetLeave();
                targetPin.onclick = () => handleTargetClick(group, index);
                
                container.appendChild(targetPin);

                group.lineups.forEach(lineup => {
                    const originPin = document.createElement('div');
                    originPin.className = `pin pin-origin origin-group-${index}`;
                    originPin.id = `origin-${lineup.id}`; 
                    originPin.style.left = `${lineup.origin[0]}%`;
                    originPin.style.top = `${lineup.origin[1]}%`;
                    
                    originPin.onclick = (e) => {
                        e.stopPropagation(); 
                        handleOriginClick(lineup);
                    };

                    container.appendChild(originPin);
                });
            });
        }

        function handleTargetHover(group, index) {
            if (activeGroupIndex === index) return; 
            showOrigins(index);
            drawLines(group);
        }

        function handleTargetLeave() {
            if (activeGroupIndex !== null) {
                showOrigins(activeGroupIndex);
                drawLines(currentGroups[activeGroupIndex]);
            } else {
                hideAllOrigins();
                clearLines();
            }
        }

        function handleTargetClick(group, index) {
            activeGroupIndex = index;
            showOrigins(index);
            drawLines(group);
            
            document.getElementById('panel-title').innerHTML = siteTexts.lineupTargetLocked; 
            document.getElementById('panel-desc').innerHTML = siteTexts.lineupSelectGreenPin; 
            document.getElementById('video-container').innerHTML = "";
        }

        function getYouTubeEmbedUrl(url) {
            if (!url) return "";
            let videoId = "";
            if (url.includes("youtube.com/watch?v=")) videoId = url.split("v=")[1].split("&")[0];
            else if (url.includes("youtu.be/")) videoId = url.split("youtu.be/")[1].split("?")[0];
            else if (url.includes("youtube.com/embed/")) return url; 
            return videoId ? `https://www.youtube.com/embed/${videoId}` : url;
        }

        // NEW: Display the Favorite Heart directly next to the Title when viewing!
        function handleOriginClick(lineup) {
            const heartIcon = isFavorite(lineup.id) ? '💛' : '🤍';
            
            document.getElementById('panel-title').innerHTML = `
                ${lineup.title}
                <span class="fav-btn-inline" onclick="toggleFavorite('${lineup.id}', event, this)">${heartIcon}</span>
            `;
            
            document.getElementById('panel-desc').innerText = lineup.desc;
            
            if (lineup.vid) {
                const embedUrl = getYouTubeEmbedUrl(lineup.vid);
                document.getElementById('video-container').innerHTML = `
                    <div class="video-wrapper">
                        <iframe src="${embedUrl}" title="YouTube video player" frameborder="0" allowfullscreen></iframe>
                    </div>
                `;
            } else {
                document.getElementById('video-container').innerHTML = `<p style="color:red;">${siteTexts.lineupNoVideo}</p>`;
            }
        }

        function showOrigins(index) {
            hideAllOrigins();
            document.querySelectorAll(`.origin-group-${index}`).forEach(pin => pin.style.display = 'block');
        }

        function hideAllOrigins() {
            document.querySelectorAll('.pin-origin').forEach(pin => pin.style.display = 'none');
        }

        function drawLines(group) {
            const svg = document.getElementById('lineup-svg');
            svg.innerHTML = ""; 
            group.lineups.forEach(lineup => {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', `${group.target[0]}%`);
                line.setAttribute('y1', `${group.target[1]}%`);
                line.setAttribute('x2', `${lineup.origin[0]}%`);
                line.setAttribute('y2', `${lineup.origin[1]}%`);
                line.setAttribute('class', 'lineup-line');
                svg.appendChild(line);
            });
        }

        function clearLines() { document.getElementById('lineup-svg').innerHTML = ""; }

        function getMapCoordinates(event) {
            if (event.shiftKey) {
                const img = event.target;
                const rect = img.getBoundingClientRect();
                const x = ((event.clientX - rect.left) / rect.width) * 100;
                const y = ((event.clientY - rect.top) / rect.height) * 100;
                alert(`Lineup Coordinates (Check Console to copy!)\n\n[${x.toFixed(2)}, ${y.toFixed(2)}]`);
                console.log(`New Lineup Coordinates -> [${x.toFixed(2)}, ${y.toFixed(2)}]`);
            }
        }
    </script>
</body>
</html>
