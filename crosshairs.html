<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pl - Crosshairs</title><link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-container"><a href="main.html"><img src="picture/logo.png" class="logo"></a></div>
        <nav><ul><li><a href="lineup.html" data-i18n="nav_lineups">Lineups</a></li><li><a href="news.html" data-i18n="nav_news">News</a></li><li><a href="videos.html" data-i18n="nav_videos">Videos</a></li><li><a href="crosshairs.html" data-i18n="nav_cross">Crosshairs</a></li><li><a href="submit.html" data-i18n="nav_sub">Submit</a></li></ul></nav>
        <div class="about-me-wrapper"><a href="main.html" class="about-me-button" data-i18n="go_back">Back</a></div>
    </header>
    <main class="home-main"><div class="welcome-banner"><h1 data-i18n="nav_cross">Pro Crosshairs</h1></div><div id="crossGrid" class="crosshair-grid"></div></main>
    <div class="settings-container"><button class="settings-btn" id="settingsBtn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></button><div class="settings-panel" id="settingsPanel"><h4 data-i18n="settings_title">Settings</h4><button class="lang-btn" id="sfxToggleBtn">Sound: ON</button><button class="lang-btn" onclick="changeLanguage('en')">[EN] English</button><button class="lang-btn" onclick="changeLanguage('tr')">[TR] Türkçe</button></div></div>
    <script src="crosshairs_data.js"></script><script src="script.js"></script>
    <script>
        function renderCrosshairs() { const g = document.getElementById('crossGrid'); if(typeof crosshairData !== 'undefined') { crosshairData.forEach(c => { const card = document.createElement('div'); card.className = 'crosshair-card'; card.onclick = (e) => { const btn = e.currentTarget.querySelector('.copy-btn'); navigator.clipboard.writeText(c.code); e.currentTarget.style.borderColor = "var(--primary-color)"; btn.innerText = "Copied!"; btn.style.background = "var(--primary-color)"; btn.style.color = "black"; setTimeout(() => { e.currentTarget.style.borderColor = "var(--panel-border)"; btn.innerText = "Copy Code"; btn.style.background = "rgba(255,255,255,0.05)"; btn.style.color = "white"; }, 1500); }; card.innerHTML = `<div class="crosshair-preview"><img src="${c.image}" onerror="this.style.display='none'"></div><h3>${c.player}</h3><p style="color:var(--primary-color); font-weight:bold; font-size:12px;">${c.team}</p><button class="copy-btn">Copy Code</button>`; g.appendChild(card); }); } } window.onload = renderCrosshairs;
    </script>
</body>
</html>
