<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lineups Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
</head>
<body>
    
    <!-- Top Bar -->
    <div class="top-bar">
        <a href="index.html" class="logo-link">
            <img src="foto/logo.png" alt="Website Logo" class="logo">
        </a>
        <div class="nav-links">
            <a href="lineup.html" data-text="navLineups">Lineups</a>
            <a href="favorites.html" data-text="navFavorites">Favorites</a>
            <a href="crosshairs.html" data-text="navCrosshairs">Crosshairs</a>
            <a href="news.html" data-text="navNews">News</a>
            <a href="videos.html" data-text="navVideos">Videos</a>
            <a href="submit.html" data-text="navSubmit">Submit</a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <h2 class="section-title" data-text="homeLineupsTitle">Latest Lineups</h2>
        <div id="recommendations-container" class="rec-grid" style="margin-bottom: 60px;"></div>

        <h2 class="section-title" data-text="homeCrosshairsTitle">Popular Crosshairs</h2>
        <div id="home-crosshairs-container" class="crosshair-grid" style="margin-bottom: 60px;"></div>

        <h2 class="section-title" data-text="homeNewsTitle">Latest News</h2>
        <div id="home-news-container" class="news-grid" style="margin-bottom: 60px;"></div>

        <h2 class="section-title" data-text="homeVideosTitle">Latest Videos</h2>
        <div id="home-videos-container" class="video-grid"></div>
    </div>

    <footer class="beta-footer" data-text="footerText">
        BETA 1.0.0
    </footer>

    <!-- Scripts -->
    <script src="lineups.js"></script>
    <script src="crosshairs_data.js"></script>
    <script src="news_data.js"></script>
    <script src="videos_data.js"></script>

    <!-- Logic for Home Page (SAFE BLOCKS INCLUDED) -->
    <script>
        // 1. Generate Lineups WITH FAVORITES HEART
        try {
            const lineupsContainer = document.getElementById('recommendations-container');
            if (typeof lineupsData !== 'undefined') {
                lineupsData.forEach(lineup => {
                    const card = document.createElement('div');
                    card.className = 'rec-card';
                    card.style.backgroundImage = `url('${lineup.image}')`;
                    
                    card.onclick = () => window.location.href = `lineup.html?id=${lineup.id}`;

                    const heartIcon = isFavorite(lineup.id) ? '💛' : '🤍';

                    card.innerHTML = `
                        <div class="fav-btn" onclick="toggleFavorite('${lineup.id}', event, this)">${heartIcon}</div>
                        <div class="card-content">
                            <div class="card-category">${lineup.agent.toUpperCase()} - ${lineup.map.toUpperCase()}</div>
                            <div class="card-title">${lineup.title}</div>
                        </div>
                    `;
                    lineupsContainer.appendChild(card);
                });
            }
        } catch(e) { console.error("Lineups failed to load:", e); }

        // 2. Generate Crosshairs
        try {
            const chContainer = document.getElementById('home-crosshairs-container');
            if (typeof crosshairsData !== 'undefined') {
                crosshairsData.slice(0, 4).forEach((ch) => {
                    const card = document.createElement('div');
                    card.className = 'crosshair-card';
                    card.innerHTML = `
                        <div class="crosshair-title">${ch.name}</div>
                        <div class="crosshair-canvas-container">
                            <canvas width="100" height="100"></canvas>
                        </div>
                        <button class="copy-btn" onclick="copyCode('${ch.code}')">${siteTexts.crosshairCopyBtn}</button>
                    `;
                    chContainer.appendChild(card);
                    drawValorantCrosshair(card.querySelector('canvas'), ch.code);
                });
            }
            function copyCode(code) { navigator.clipboard.writeText(code).then(() => alert(siteTexts.crosshairCopiedAlert)); }
        } catch(e) { console.error("Crosshairs failed to load:", e); }

        // 3. Generate News
        try {
            const newsContainer = document.getElementById('home-news-container');
            if (typeof newsData !== 'undefined') {
                newsData.slice(0, 3).forEach(article => {
                    const dateObj = new Date(article.date);
                    const formattedDate = dateObj.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
                    const card = document.createElement('div');
                    card.className = 'news-card';
                    card.innerHTML = `
                        <div class="news-image" style="background-image: url('${article.image}');"><div class="news-category">${article.category}</div></div>
                        <div class="news-content">
                            <div class="news-date">${formattedDate}</div>
                            <h3 class="news-title">${article.title}</h3>
                            <p class="news-summary">${article.summary}</p>
                            <a href="${article.link}" class="news-read-more" target="_blank">${siteTexts.newsReadMore} →</a>
                        </div>
                    `;
                    newsContainer.appendChild(card);
                });
            }
        } catch(e) { console.error("News failed to load:", e); }

        // 4. Generate Videos dynamically from YouTube
        try {
            const homeVideosContainer = document.getElementById('home-videos-container');
            async function fetchHomeVideos() {
                if (typeof targetChannels === 'undefined') return;
                let allVideos = [];
                for (const channel of targetChannels) {
                    try {
                        const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=` + encodeURIComponent(`https://www.youtube.com/feeds/videos.xml?channel_id=${channel.id}`));
                        const data = await response.json();
                        if (data.status === 'ok') {
                            const longFormItems = data.items.filter(item => !item.title.toLowerCase().includes('#short'));
                            allVideos = allVideos.concat(longFormItems.slice(0, 3).map(item => ({ title: item.title, link: item.link, thumbnail: item.thumbnail, author: item.author, date: new Date(item.pubDate) })));
                        }
                    } catch (error) {}
                }
                allVideos.sort((a, b) => b.date - a.date);
                allVideos.slice(0, 3).forEach(video => {
                    const card = document.createElement('a');
                    card.className = 'video-grid-card';
                    card.href = video.link; card.target = '_blank';
                    card.innerHTML = `
                        <div class="video-grid-thumb" style="background-image: url('${video.thumbnail}')"><div class="play-overlay">▶</div></div>
                        <div class="video-grid-info"><div class="video-grid-author">${video.author}</div><div class="video-grid-title">${video.title}</div><div class="video-grid-date">${video.date.toLocaleDateString()}</div></div>
                    `;
                    homeVideosContainer.appendChild(card);
                });
            }
            fetchHomeVideos();
        } catch(e) { console.error("Videos failed to load:", e); }
    </script>
</body>
</html>
