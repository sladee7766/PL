<!DOCTYPE html>
<html>
<head>
    <!-- This tells the browser to redirect to main.html after 0 seconds -->
    <meta http-equiv="refresh" content="0; url=main.html">
    <title>Redirecting...</title>
</head>
<body>
    <p>Redirecting to <a href="main.html">main.html</a>...</p>
    <script>
        // Backup redirection in case the meta tag fails
        window.location.href = "main.html";
    </script>
</body>
</html>
