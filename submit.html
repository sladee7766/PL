<script>
    async function sendToDiscord() {
        // Kendi Discord Webhook Linkin
        const u = "https://discord.com/api/webhooks/1513538094517977411/VsrtWKEc1YT4MMewhPcTJyQ1wocOqoWL2NXcZVs5y2M0zAy6JHiUGu9SIWxYyW08laI_";
        const s = document.getElementById('statusMessage');

        // Input verilerini alıyoruz
        const name = document.getElementById('subName').value || "Anonim";
        const mapAgent = document.getElementById('subAgentMap').value;
        const link = document.getElementById('subLink').value;
        const desc = document.getElementById('subDesc').value || "Belirtilmemiş";

        // Boş bırakılamaz alanların kontrolü
        if(!mapAgent || !link) {
            s.innerText = "Please fill Map/Agent and Video Link!";
            s.style.color = "var(--accent-red, red)";
            return;
        }

        s.innerText = "Gönderiliyor... ⏳";
        s.style.color = "white";

        // Discord'a şık bir "Embed" kutusu ile gönderiyoruz
        const payload = {
            embeds: [
                {
                    title: "🚨 YENİ LINEUP GÖNDERİLDİ! 🚨",
                    color: 16711680, // Kırmızı renk kodu
                    fields: [
                        { name: "👤 Gönderen", value: name, inline: true },
                        { name: "🗺️ Harita & Ajan", value: mapAgent, inline: true },
                        { name: "🔗 Video Linki", value: link, inline: false },
                        { name: "📝 Detaylar", value: desc, inline: false }
                    ],
                    timestamp: new Date().toISOString()
                }
            ]
        };

        try {
            const response = await fetch(u, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            // Eğer Discord isteği kabul etmezse (örn: Webhook silinmişse)
            if(!response.ok) {
                throw new Error("Discord API Hatası: " + response.status);
            }

            // Başarılı olduğunda
            s.innerText = "Submitted Successfully! 🎉";
            s.style.color = "var(--primary-color, #00ff00)";

            // Gönderimden sonra formdaki yazıları temizle
            document.getElementById('subName').value = "";
            document.getElementById('subAgentMap').value = "";
            document.getElementById('subLink').value = "";
            document.getElementById('subDesc').value = "";

        } catch(error) {
            console.error("Webhook Hatası:", error);
            s.innerText = "Hata! (Reklam engelleyicini kapat veya Live Server ile aç)";
            s.style.color = "var(--accent-red, red)";
        }
    }
</script>
