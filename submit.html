<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pl - Submit</title><link rel="stylesheet" href="style.css">
    <style>
        .submit-container { 
            background: var(--panel-bg); backdrop-filter: blur(25px); padding: 50px; 
            border-radius: 25px; border: 1px solid var(--panel-border); max-width: 550px; 
            margin: 0 auto; text-align: left; box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
        } 
        .form-group { margin-bottom: 25px; } 
        .form-group label { display: block; margin-bottom: 10px; color: var(--primary-color); font-size: 13px; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; } 
        .form-input { width: 100%; padding: 15px 20px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 12px; outline: none; font-size: 15px; font-weight: 600; transition: all 0.3s ease; } 
        .form-input:focus { border-color: var(--primary-color); background: rgba(0,0,0,0.6); box-shadow: 0 0 15px rgba(0, 255, 204, 0.2); } 
        #statusMessage { margin-top: 20px; font-size: 14px; font-weight: 800; text-align: center; padding: 10px; border-radius: 10px; transition: 0.3s; }
        .submit-btn { width: 100%; background: var(--primary-color); color: black; padding: 18px; border: none; border-radius: 12px; font-weight: 900; font-size: 16px; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .submit-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0, 255, 204, 0.4); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
    </style>
</head>
<body>
    <header>
        <div class="logo-container"><a href="main.html"><img src="picture/logo.png" class="logo"></a></div>
        <nav><ul><li><a href="lineup.html" data-i18n="nav_lineups">Lineups</a></li><li><a href="news.html" data-i18n="nav_news">News</a></li><li><a href="videos.html" data-i18n="nav_videos">Videos</a></li><li><a href="crosshairs.html" data-i18n="nav_cross">Crosshairs</a></li><li><a href="submit.html" data-i18n="nav_sub">Submit</a></li></ul></nav>
        <div class="about-me-wrapper"><a href="main.html" class="about-me-button" data-i18n="go_back">Back</a></div>
    </header>
    <main class="home-main" style="text-align: center;">
        <div class="welcome-banner"><h1 data-i18n="sub_title">Submit a Lineup</h1><p data-i18n="submit_desc">Mükemmel bir lineup mı buldun? Bize gönder!</p></div>
        <div class="submit-container">
            <div class="form-group"><label data-i18n="sub_name">Your Name</label><input type="text" id="subName" class="form-input" data-i18n="sub_name_ph"></div>
            <div class="form-group"><label data-i18n="sub_map">Map & Agent</label><input type="text" id="subAgentMap" class="form-input" data-i18n="sub_map_ph"></div>
            <div class="form-group"><label data-i18n="sub_vid">Video Link</label><input type="url" id="subLink" class="form-input" data-i18n="sub_vid_ph"></div>
            <div class="form-group"><label data-i18n="sub_desc">Details</label><textarea id="subDesc" class="form-input" rows="3" data-i18n="sub_desc_ph"></textarea></div>
            <button class="submit-btn" id="submitBtn" onclick="sendToDiscord()" data-i18n="sub_btn">Send Lineup</button>
            <div id="statusMessage"></div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        // SPAM VE BEKLEME SÜRESİ KONTROLLERİ İÇİN DEĞİŞKENLER
        let lastSubmitData = "";
        let nextSubmitTime = 0; 
        const COOLDOWN_SECONDS = 30; // 30 saniye delay

        async function sendToDiscord() { 
            const u = "https://discord.com/api/webhooks/1513538094517977411/VsrtWKEc1YT4MMewhPcTJyQ1wocOqoWL2NXcZVs5y2M0zAy6JHiUGu9SIWxYyW08laI_"; 
            const s = document.getElementById('statusMessage'); 
            const btn = document.getElementById('submitBtn');

            // Girdileri temizleyip alıyoruz
            const name = document.getElementById('subName').value.trim() || "Anonim";
            const mapAgent = document.getElementById('subAgentMap').value.trim();
            const link = document.getElementById('subLink').value.trim();
            const desc = document.getElementById('subDesc').value.trim() || "Belirtilmemiş";

            // Boş bırakılamaz alanların kontrolü
            if(!mapAgent || !link) { 
                s.innerText = "Lütfen Harita/Ajan ve Video Linkini doldurun!"; 
                s.style.color = "var(--accent-red)"; 
                s.style.background = "rgba(255, 51, 102, 0.1)";
                return; 
            } 

            // 1. BEKLEME SÜRESİ (DELAY) KONTROLÜ
            const now = Date.now();
            if (now < nextSubmitTime) {
                const kalanSaniye = Math.ceil((nextSubmitTime - now) / 1000);
                s.innerText = `Lütfen bekleyin! Yeni gönderim için ${kalanSaniye} saniye kaldı. ⏳`;
                s.style.color = "var(--accent-gold)";
                s.style.background = "rgba(255, 204, 0, 0.1)";
                return;
            }

            // 2. KOPYA / SPAM KONTROLÜ (Birebir aynı içeriği tekrar atmasını engeller)
            const currentDataHash = `${mapAgent}-${link}-${desc}`.toLowerCase();
            if (currentDataHash === lastSubmitData) {
                s.innerText = "Bu lineup'ı zaten gönderdiniz! Farklı bir şey ekleyin. 🚫";
                s.style.color = "var(--accent-red)";
                s.style.background = "rgba(255, 51, 102, 0.1)";
                return;
            }

            // Gönderim başlarken buton kapanır
            btn.disabled = true;
            s.innerText = "Gönderiliyor... 🚀"; 
            s.style.color = "white"; 
            s.style.background = "transparent";

            const payload = {
                embeds: [{
                    title: "🚨 YENİ LINEUP GÖNDERİLDİ! 🚨",
                    color: 65484, // Canlı Neon Turkuaz
                    fields: [
                        { name: "👤 Gönderen", value: name, inline: true },
                        { name: "🗺️ Harita & Ajan", value: mapAgent, inline: true },
                        { name: "🔗 Video Linki", value: link, inline: false },
                        { name: "📝 Detaylar", value: desc, inline: false }
                    ],
                    timestamp: new Date().toISOString()
                }]
            };

            try {
                const response = await fetch(u, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
                if(!response.ok) throw new Error("Discord API Error");

                s.innerText = "Başarıyla Gönderildi! 🎉 Ekibe ulaştı."; 
                s.style.color = "var(--primary-color)"; 
                s.style.background = "rgba(0, 255, 204, 0.1)";

                // Başarılı olduğunda veriyi belleğe kaydet ve bekleme süresini başlat
                lastSubmitData = currentDataHash;
                nextSubmitTime = Date.now() + (COOLDOWN_SECONDS * 1000);

                // Formu temizle
                document.getElementById('subName').value = "";
                document.getElementById('subAgentMap').value = "";
                document.getElementById('subLink').value = "";
                document.getElementById('subDesc').value = "";

            } catch(e) {
                s.innerText = "Hata! (Reklam engelleyicinizi kapatıp deneyin)"; 
                s.style.color = "var(--accent-red)"; 
                s.style.background = "rgba(255, 51, 102, 0.1)";
            } finally {
                // Saniye sayan bir Timer (Görsel amaçlı)
                const timerInterval = setInterval(() => {
                    const remaining = Math.ceil((nextSubmitTime - Date.now()) / 1000);
                    if (remaining <= 0) {
                        clearInterval(timerInterval);
                        btn.disabled = false;
                        btn.innerText = "Send Lineup";
                    } else {
                        btn.innerText = `Lütfen Bekleyin (${remaining}s)`;
                    }
                }, 1000);
            }
        }
    </script>
</body>
</html>
