<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
</head>
<body>
    
    <div class="top-bar">
        <a href="index.html" class="logo-link">
            <img src="foto/logo.png" alt="Website Logo" class="logo">
        </a>
        <div class="nav-links">
            <a href="lineup.html" data-text="navLineups">Lineups</a>
            <a href="crosshairs.html" data-text="navCrosshairs">Crosshairs</a>
            <a href="news.html" data-text="navNews">News</a>
            <a href="videos.html" data-text="navVideos">Videos</a>
            <a href="submit.html" data-text="navSubmit">Submit</a>
        </div>
    </div>

    <div class="main-content">
        <h2 class="section-title" data-text="videosTitle">Latest Community Videos</h2>
        
        <div id="loading-text" class="loading-state" data-text="videosLoading">CONNECTING TO YOUTUBE...</div>
        <div id="videos-container" class="video-grid"></div>
    </div>

    <footer class="beta-footer" data-text="footerText">
        BETA 1.0.0
    </footer>

    <script src="videos_data.js"></script>
    <script>
        const container = document.getElementById('videos-container');
        const loadingText = document.getElementById('loading-text');

        async function fetchVideos() {
            if (typeof targetChannels === 'undefined') return;
            
            let allVideos = [];

            for (const channel of targetChannels) {
                try {
                    const rssUrl = encodeURIComponent(`https://www.youtube.com/feeds/videos.xml?channel_id=${channel.id}`);
                    const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`);
                    const data = await response.json();
                    
                    if (data.status === 'ok') {
                        // FILTER: Removes any video with '#short' in the title
                        const longFormItems = data.items.filter(item => !item.title.toLowerCase().includes('#short'));

                        const videos = longFormItems.slice(0, 6).map(item => ({
                            title: item.title,
                            link: item.link,
                            thumbnail: item.thumbnail,
                            author: item.author, 
                            date: new Date(item.pubDate)
                        }));
                        allVideos = allVideos.concat(videos);
                    }
                } catch (error) {
                    console.error("Error fetching for", channel.name, error);
                }
            }

            allVideos.sort((a, b) => b.date - a.date);

            loadingText.style.display = 'none';

            allVideos.forEach(video => {
                const card = document.createElement('a');
                card.className = 'video-grid-card';
                card.href = video.link; 
                card.target = '_blank'; 
                
                card.innerHTML = `
                    <div class="video-grid-thumb" style="background-image: url('${video.thumbnail}')">
                        <div class="play-overlay">▶</div>
                    </div>
                    <div class="video-grid-info">
                        <div class="video-grid-author">${video.author}</div>
                        <div class="video-grid-title">${video.title}</div>
                        <div class="video-grid-date">${video.date.toLocaleDateString()}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        fetchVideos();
    </script>

</body>
</html>
