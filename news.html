<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pl - News</title><link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-container"><a href="main.html"><img src="picture/logo.png" class="logo"></a></div>
        <nav><ul>
            <li><a href="lineup.html" data-i18n="nav_lineups">Lineups</a></li>
            <li><a href="news.html" data-i18n="nav_news">News</a></li>
            <li><a href="videos.html" data-i18n="nav_videos">Videos</a></li>
        </ul></nav>
        <div class="about-me-wrapper"><a href="#" class="about-me-button" id="aboutMeBtn" data-i18n="nav_about">About Me</a>
            <div class="about-me-dropdown" id="aboutMeDropdown">
                <div class="social-links">
                    <a href="https://www.tiktok.com/@sladee7766" target="_blank">TikTok</a>
                    <a href="https://www.instagram.com/sladee7766" target="_blank">Instagram</a>
                    <a href="https://www.youtube.com/@sladee7766" target="_blank">YouTube</a>
                </div>
            </div>
        </div>
    </header>

    <main class="home-main">
        <div class="welcome-banner"><h1 data-i18n="news_header">News</h1></div>
        <div id="newsTimeline" class="news-timeline"></div>
    </main>

    <div id="articleOverlay" class="article-overlay">
        <button class="article-close-btn" onclick="closeArticle()">&times;</button>
        <div class="article-container"><h1 id="articleTitle"></h1><p id="articleDate" style="color:#888; margin-bottom:20px;"></p><div id="articleBody"></div></div>
    </div>

    <!-- Corrected IDs below -->
    <div class="settings-container"><button class="settings-btn" id="settingsBtn">⚙</button>
        <div class="settings-panel" id="settingsPanel">
            <h4 data-i18n="settings_title">Settings</h4>
            <button class="lang-btn" onclick="changeLanguage('en')">English</button>
            <button class="lang-btn" onclick="changeLanguage('tr')">Türkçe</button>
        </div>
    </div>

    <script src="lineups.js"></script><script src="news_data.js"></script><script src="script.js"></script>
    <script>
        function renderNews() {
            const c = document.getElementById('newsTimeline'), l = localStorage.getItem('app_lang') || 'en';
            [...newsData].sort((a,b)=>b.id-a.id).forEach(art => {
                const r = document.createElement('div'); r.className = 'news-row'; r.onclick = () => openArticle(art);
                r.innerHTML = `<img src="${art.thumbnail}" class="news-thumb"><div class="news-info"><span class="badge ${art.type}">${art.type}</span><h2 style="margin:10px 0;">${art.title[l]}</h2><span data-i18n="read_more">Read</span></div>`;
                c.appendChild(r);
            });
        }
        function openArticle(art) {
            const l = localStorage.getItem('app_lang') || 'en', b = document.getElementById('articleBody');
            document.getElementById('articleTitle').innerText = art.title[l]; document.getElementById('articleDate').innerText = art.date;
            b.innerHTML = ""; art.content.forEach(bl => {
                if(bl.type==='text') b.innerHTML += `<p style="line-height:1.8; margin-bottom:20px;">${bl[l]}</p>`;
                else if(bl.type==='image') b.innerHTML += `<img src="${bl.url}" class="article-image" style="width:100%; border-radius:10px; margin-bottom:20px;">`;
                else if(bl.type==='video') b.innerHTML += `<div class="iframe-wrapper"><iframe src="${bl.url}" allowfullscreen></iframe></div>`;
            });
            document.getElementById('articleOverlay').style.display = "block";
        }
        function closeArticle() { document.getElementById('articleOverlay').style.display = "none"; }
        window.onload = renderNews;
    </script>
</body>
</html>
