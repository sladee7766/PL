<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pl - News</title><link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-container"><a href="main.html"><img src="picture/logo.png" class="logo"></a></div>
        <nav><ul><li><a href="lineup.html" data-i18n="nav_lineups">Lineups</a></li><li><a href="news.html" data-i18n="nav_news">News</a></li><li><a href="videos.html" data-i18n="nav_videos">Videos</a></li></ul></nav>
        <div class="about-me-wrapper"><a href="#" class="about-me-button" id="aboutMeBtn" data-i18n="nav_about">About Me</a>
            <div class="about-me-dropdown"><div class="social-links"><a href="#">TikTok</a><a href="#">Instagram</a><a href="#">YouTube</a></div></div>
        </div>
    </header>
    <main class="home-main"><div class="welcome-banner"><h1 data-i18n="news_header">News</h1></div><div id="newsTimeline" class="news-timeline"></div></main>
    <div id="articleOverlay" class="article-overlay"><button class="article-close-btn" onclick="closeArt()">&times;</button><div class="article-container"><h1 id="artTitle"></h1><p id="artDate" style="color:#888; margin-bottom:20px;"></p><div id="artBody"></div></div></div>
    <div class="settings-container"><button class="settings-btn" id="settingsBtn">⚙</button><div class="settings-panel"><button class="lang-btn" onclick="changeLanguage('en')">English</button><button class="lang-btn" onclick="changeLanguage('tr')">Türkçe</button></div></div>
    <script src="lineups.js"></script><script src="news_data.js"></script><script src="script.js"></script>
    <script>
        function render() {
            const c = document.getElementById('newsTimeline'), l = localStorage.getItem('app_lang') || 'en';
            newsData.sort((a,b)=>b.id-a.id).forEach(art => {
                const r = document.createElement('div'); r.className = 'news-row'; r.onclick = () => openArt(art);
                r.innerHTML = `<img src="${art.thumbnail}" class="news-thumb"><div class="news-info"><span class="badge ${art.type}">${art.type}</span><h2 class="news-title">${art.title[l]}</h2><span class="news-read-btn" data-i18n="read_more">Read More</span></div>`;
                c.appendChild(r);
            });
        }
        function openArt(art) {
            const l = localStorage.getItem('app_lang') || 'en', b = document.getElementById('artBody');
            document.getElementById('artTitle').innerText = art.title[l]; document.getElementById('artDate').innerText = art.date;
            b.innerHTML = ""; art.content.forEach(bl => {
                if(bl.type==='text') b.innerHTML += `<p class="article-text">${bl[l]}</p>`;
                else if(bl.type==='image') b.innerHTML += `<img src="${bl.url}" class="article-image">`;
                else if(bl.type==='video') b.innerHTML += `<div class="iframe-wrapper"><iframe src="${bl.url}" allowfullscreen></iframe></div>`;
            });
            document.getElementById('articleOverlay').classList.add('active');
        }
        function closeArt() { document.getElementById('articleOverlay').classList.remove('active'); }
        window.onload = render;
    </script>
</body>
</html>
